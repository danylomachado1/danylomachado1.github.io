name: Scheduled Pages Refresh

# Runs every Monday at 06:00 UTC so that the GitHub Pages CDN re-serves
# the latest index.html and external API data (ORCID, arXiv) is picked up
# by any cached pre-rendered snapshot crawlers may hold.
# Can also be triggered manually from the Actions tab.

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump refresh timestamp
        run: |
          echo "$(date -u '+%Y-%m-%dT%H:%M:%SZ')" > .pages-last-refresh
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .pages-last-refresh
          git diff --cached --quiet || git commit -m "chore: scheduled Pages refresh $(date -u '+%Y-%m-%d') [skip ci]"
          git push
